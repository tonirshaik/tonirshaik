<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ======================================================= -->
    <!-- গুগল ইমেজ ও টেক্সট সার্চের জন্য হাই-লেভেল এসইও মেটা ট্যাগ -->
    <!-- ======================================================= -->
    <title>Tonir Shaik</title>
    <meta name="description" content="Official photo gallery of Tonir Shaik. View and download high-quality official photos, portraits, and exclusive images of Tonir Shaik.">
    <meta name="keywords" content="tonirshaik, tonir shaik, tonir shaik photo, tonir shaik official image, tonirshaik github, tonir shaik picture">
    <meta name="author" content="Tonir Shaik">
    
    <!-- গুগলের ইমেজ বটকে ছবিগুলো ক্রল করার অনুমতি দেওয়া -->
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="googlebot" content="index, follow">
    <meta name="googlebot-image" content="index, follow">
    <!-- ======================================================= -->

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #c5a059;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 30px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }
        .photo-card {
            position: relative;
            width: 180px;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(197, 160, 89, 0.2);
        }
        .photo-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }
         .download-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .download-btn svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .download-btn:hover {
            background: #c5a059;
            color: #0b0c10;
            border-color: #c5a059;
            box-shadow: 0 0 15px #c5a059;
        }
        .download-btn:hover svg {
            transform: translateY(2px);
        }
        .lightbox {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 12, 16, 0.95);
            align-items: center;
            justify-content: center;
        }
        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 85%;
        }
        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .close-btn {
            position: absolute;
            top: -45px;
            left: 10px;
            color: #ffffff;
            font-size: 35px;
            font-weight: 300;
            cursor: pointer;
        }
        .close-btn:hover {
            color: #c5a059;
        }
        .site-footer {
            margin-top: 60px;
            padding-top: 25px;
            padding-bottom: 25px;
            border-top: 1px solid rgba(197, 160, 89, 0.15);
        }
        .footer-title {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .footer-copyright {
            font-size: 13px;
            color: #c5a059;
            opacity: 0.85;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1>Tonir Shaik</h1>

    <div class="gallery">

        <!-- ছবি ১: ইমেজ এসইও যুক্ত করা হয়েছে -->
        <div class="photo-card">
            <img src="https://i.ibb.co/RkbRbhv4/tonirshaik-1.jpg" alt="Tonir Shaik Official Photo" title="Tonir Shaik Portrait Image" onclick="openLightbox('https://i.ibb.co/RkbRbhv4/tonirshaik-1.jpg', 'tonir-shaik-1.jpg')">
            <button class="download-btn" onclick="forceDownload('https://i.ibb.co/RkbRbhv4/tonirshaik-1.jpg', 'tonir-shaik-1.jpg'); event.stopPropagation();" title="Download Tonir Shaik Photo">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
        </div>

        <!-- ছবি ২: ইমেজ এসইও যুক্ত করা হয়েছে -->
        <div class="photo-card">
            <img src="https://i.ibb.co/fYCWhsYS/tonirshaik-1.jpg" alt="Tonir Shaik New Picture" title="Tonir Shaik Premium Photo" onclick="openLightbox('https://i.ibb.co/fYCWhsYS/tonirshaik-1.jpg', 'tonir-shaik-2.jpg')">
            <button class="download-btn" onclick="forceDownload('https://i.ibb.co/fYCWhsYS/tonirshaik-1.jpg', 'tonir-shaik-2.jpg'); event.stopPropagation();" title="Download Tonir Shaik Photo">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
        </div>

        <!-- ছবি ৩: ইমেজ এসইও যুক্ত করা হয়েছে -->
        <div class="photo-card">
            <img src="https://i.ibb.co/C3kFSRk4/tonirshaik.jpg" alt="Tonir Shaik Gallery Image" title="Tonir Shaik Profile Picture" onclick="openLightbox('https://i.ibb.co/C3kFSRk4/tonirshaik.jpg', 'tonir-shaik-3.jpg')">
            <button class="download-btn" onclick="forceDownload('https://i.ibb.co/C3kFSRk4/tonirshaik.jpg', 'tonir-shaik-3.jpg'); event.stopPropagation();" title="Download Tonir Shaik Photo">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
        </div>

    </div>

    <div id="myLightbox" class="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation();">
            <span class="close-btn" onclick="closeLightbox()">&times;</span>
            <button id="popupDownloadBtn" class="download-btn" style="top: 15px; right: 15px; width: 44px; height: 44px;">
                <svg viewBox="0 0 24 24" style="width: 22px; height: 22px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
            <img id="lightboxImg" src="" alt="Tonir Shaik HD Photo View">
        </div>
    </div>

    <!-- গুগল সাইট ব্যাকলিংক বাটন -->
    <div style="margin-top: 50px; margin-bottom: 10px;">
        <a href="https://sites.google.com/view/tonirshaik2/" target="_blank" style="display: inline-block; padding: 12px 30px; background-color: transparent; color: #c5a059; border: 2px solid #c5a059; border-radius: 25px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; letter-spacing: 1px; font-family: 'Segoe UI', sans-serif;" onmouseover="this.style.backgroundColor='#c5a059'; this.style.color='#0b0c10'; this.style.boxShadow='0 0 15px #c5a059';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='#c5a059'; this.style.boxShadow='none';">
            🌐 VISIT MY OFFICIAL GOOGLE SITE
        </a>
    </div>

    <footer class="site-footer">
        <div class="footer-title">Tonir Shaik | Official Photo Gallery</div>
        <div class="footer-copyright">© 2026 Tonir Shaik. All Rights Reserved.</div>
    </footer>

    <script>
        function openLightbox(imgUrl, fileName) {
            document.getElementById("lightboxImg").src = imgUrl;
            document.getElementById("myLightbox").style.display = "flex";
            
            const popupBtn = document.getElementById("popupDownloadBtn");
            popupBtn.onclick = function() {
                forceDownload(imgUrl, fileName);
            };
        }

        function closeLightbox() {
            document.getElementById("myLightbox").style.display = "none";
        }

        function forceDownload(url, fileName) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                })
                .catch(() => {
                    window.open(url, '_blank');
                });
        }
    </script>

</body>
</html>

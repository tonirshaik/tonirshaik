<script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    // Maps the section header found in the text file (e.g. "#SINGLE")
    // to the internal category key and the label shown in the gallery overlay.
    const CATEGORY_LABELS = { single: 'Single', dual: 'Dual', group: 'Group' };
    const PAGE_SIZE = 15;

    let allPhotos = [];
    let currentList = [];
    let visibleCount = 0;
    let currentIdx = 0;
    let activeFilter = 'all';   // which filter button is selected
    let searchQuery = '';       // current lowercased search text

    const csvUrl = 'https://raw.githubusercontent.com/tonirshaik/tonirshaik/refs/heads/main/Tonir%20photo%20Link.txt?t=' + Date.now();
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyLRiJ9ueiqnc7kYc188HTg41wJNF3W1eighA2WA7xq9nUfMTJflzefxdXsrjIHOgXiLw/exec';
    const ADMIN_PASSWORD = 'T@$Fim2002T@niR';

    // ---- Google Drive link handling ----
    // Recognizes share links (file/d/ID/view), open?id=ID, and uc?...id=ID,
    // and normalizes all of them to Google's image-serving thumbnail endpoint,
    // which renders reliably in <img> tags (the uc?export=download endpoint
    // can return an HTML interstitial instead of image bytes for some files).
    function getDriveFileId(url) {
        let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (m) return m[1];
        m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (m) return m[1];
        return null;
    }

    function isGoogleDriveUrl(url) {
        return /drive\.google\.com/.test(url);
    }

    // Returns the best <img>-renderable URL for a given raw link.
    // Non-Drive links (e.g. ImgBB) are returned unchanged.
    function toRenderableUrl(url, size) {
        if (isGoogleDriveUrl(url)) {
            const id = getDriveFileId(url);
            if (id) {
                return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w' + (size || 1000);
            }
        }
        return url;
    }

    // Returns a direct-download URL used for the Download button,
    // so saved files come through as the original image rather than a thumbnail.
    function toDownloadUrl(url) {
        if (isGoogleDriveUrl(url)) {
            const id = getDriveFileId(url);
            if (id) {
                return 'https://drive.google.com/uc?export=download&id=' + id;
            }
        }
        return url;
    }

    // Parses the text file line by line, tracking which #SECTION header
    // (#SINGLE, #DUAL, #GROUP) the reader is currently under. Every URL line
    // is tagged with whatever section it falls beneath. A URL that appears
    // before any header, or under an unrecognized header, falls back to
    // 'uncategorized' so it still shows under "All" but won't match a filter.
    //
    // Optional per-photo names: a line can be just a URL, or
    // "URL, name1 name2 ..." — anything after the first comma is treated as
    // free-text names/tags (English and/or Bengali, space-separated) and
    // folded into that photo's search index. This is the "keyword index"
    // approach: raw Drive/ImgBB links carry no filename metadata themselves
    // (Drive's image-serving endpoints return image bytes, not a title — and
    // the actual Drive API needed for real filenames requires a server-side
    // key, not something this page can call directly), so names have to be
    // supplied here once and then search instantly against this index.
    //
    // Bengali-English search note: matching is done by direct substring
    // comparison against whatever scripts are present in the name field, so
    // "rakib" only matches if an English form was provided and "রাকিব" only
    // matches if a Bengali form was provided. There's no automatic
    // transliteration between the two — to support both spellings for a
    // photo, include both in the name field for that line.
    const SECTION_SEARCH_WORDS = {
        single: ['single', 'একজন'],
        dual: ['dual', 'couple', 'দুইজন', 'কাপল'],
        group: ['group', 'দলগত', 'গ্রুপ']
    };

    function parsePhotoFile(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const photos = [];
        let currentCat = 'uncategorized';

        lines.forEach(line => {
            const headerMatch = line.match(/^#\s*(single|dual|group)\b/i);
            if (headerMatch) {
                currentCat = headerMatch[1].toLowerCase();
                return;
            }
            if (line.startsWith('http')) {
                const commaIdx = line.indexOf(',');
                const url = (commaIdx === -1 ? line : line.slice(0, commaIdx)).trim();
                const namesRaw = commaIdx === -1 ? '' : line.slice(commaIdx + 1).trim();

                const idx = photos.length;
                const sectionWords = SECTION_SEARCH_WORDS[currentCat] || [];
                const searchIndex = [namesRaw, ...sectionWords]
                    .join(' ')
                    .toLowerCase();

                photos.push({
                    url: toRenderableUrl(url, 1000),
                    rawUrl: url,
                    downloadUrl: toDownloadUrl(url),
                    idx: idx,
                    cat: currentCat,
                    names: namesRaw,            // raw display string, e.g. "Rakib রাকিব"
                    searchIndex: searchIndex,   // lowercased, used for matching
                    title: namesRaw || ('Photo ' + (idx + 1))
                });
            }
            // Any other line (blank already filtered, stray text, etc.) is ignored.
        });

        return photos;
    }

    // Apps Script থেকে আসা একটা ছবিকে মূল গ্যালারির photo-object ফরম্যাটে রূপান্তর করে
    function liveImageToPhoto(img, idx) {
        const caption = (img.caption || '').trim();
        return {
            url: img.url,
            rawUrl: img.url,
            downloadUrl: img.url,
            idx: idx,
            cat: 'uncategorized',
            names: caption,
            searchIndex: caption.toLowerCase(),
            title: caption || ('New Photo ' + (idx + 1))
        };
    }

    function fetchLiveUploads() {
        return fetch(APPS_SCRIPT_URL)
            .then(r => r.json())
            .then(res => (res && res.success && Array.isArray(res.images)) ? res.images : [])
            .catch(() => []); // ব্যাকএন্ডে সমস্যা হলেও মূল গ্যালারি ভাঙবে না
    }

    function buildMergedPhotoList(oldPhotos, liveImages) {
        let newPhotos = [];
        try {
            newPhotos = (liveImages || [])
                .filter(img => img && img.url)
                .map((img, i) => liveImageToPhoto(img, oldPhotos.length + i));
        } catch (e) {
            newPhotos = []; // নতুন ছবি প্রসেস করতে সমস্যা হলেও পুরোনো গ্যালারি অক্ষত থাকবে
        }
        // নতুন আপলোড করা ছবি সবার আগে দেখানোর জন্য শুরুতে রাখা হলো
        return [...newPhotos, ...oldPhotos];
    }

    fetch(csvUrl).then(r => r.text()).catch(() => '').then(textData => {
        const oldPhotos = textData ? parsePhotoFile(textData) : [];

        // পুরোনো গ্যালারি সাথে সাথেই দেখিয়ে দেওয়া হলো — নতুন আপলোড লোড না হলেও সাইট আটকে থাকবে না
        allPhotos = oldPhotos;
        document.getElementById('photoCount').textContent = allPhotos.length;
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('masonry').style.display = '';
        currentList = allPhotos;
        renderGallery(currentList, true);
        buildStrip(allPhotos);

        // তারপর নতুন আপলোড আলাদাভাবে যুক্ত করা হলো — এটা ব্যর্থ হলেও উপরের অংশ ইতিমধ্যে দেখানো হয়ে গেছে
        fetchLiveUploads().then(liveImages => {
            if (!liveImages || liveImages.length === 0) return;
            allPhotos = buildMergedPhotoList(oldPhotos, liveImages);
            document.getElementById('photoCount').textContent = allPhotos.length;
            applyFiltersAndSearch();
            buildStrip(allPhotos);
        });
    }).catch(() => {
        document.getElementById('loadingState').innerHTML =
            '<p style="color:var(--muted)">Could not load photos. Check your connection.</p>';
    });

    const imgObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                if (img.dataset.src) {
                    img.src = img.dataset.src;
                    img.removeAttribute('data-src');
                }
                imgObserver.unobserve(img);
            }
        });
    }, { rootMargin: '300px 0px' });

    // If a Drive thumbnail URL fails to load (rare, but can happen for
    // restricted-sharing files), fall back once to the uc?export=view endpoint
    // before giving up — keeps a single bad link from looking broken needlessly.
    function attachImgFallback(imgEl, photo) {
        let triedFallback = false;
        imgEl.addEventListener('error', function onErr() {
            if (triedFallback) return;
            triedFallback = true;
            if (isGoogleDriveUrl(photo.rawUrl)) {
                const id = getDriveFileId(photo.rawUrl);
                if (id) {
                    imgEl.src = 'https://drive.google.com/uc?export=view&id=' + id;
                    return;
                }
            }
        });
    }

    function renderGallery(photos, reset) {
        const masonry = document.getElementById('masonry');
        if (reset) { masonry.innerHTML = ''; visibleCount = 0; }
        const start = visibleCount;
        const end = Math.min(visibleCount + PAGE_SIZE, photos.length);
        const slice = photos.slice(start, end);
        slice.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'photo-item reveal';
            item.dataset.cat = p.cat;
            const placeholder = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 4'%3E%3Crect width='3' height='4' fill='%231C1A16'/%3E%3C/svg%3E";
            item.innerHTML = `
                <img data-src="${p.url}" src="${placeholder}" alt="${p.title}" style="background:#1C1A16;">
                <div class="photo-overlay">
                    <div class="photo-meta">
                        <div class="photo-tag">${CATEGORY_LABELS[p.cat] || ''}</div>
                        <div class="photo-title">${p.title}</div>
                    </div>
                    <div class="photo-actions">
                        <button class="photo-action-btn" title="View" onclick="openLightbox(${p.idx});event.stopPropagation()">⤢</button>
                        <button class="photo-action-btn" title="Download" onclick="dlImg('${p.downloadUrl}','Tonir-${p.idx + 1}.jpg');event.stopPropagation()">↓</button>
                    </div>
                </div>`;
            item.addEventListener('click', () => openLightbox(p.idx));
            masonry.appendChild(item);
            const imgEl = item.querySelector('img');
            attachImgFallback(imgEl, p);
            imgObserver.observe(imgEl);
            setTimeout(() => item.classList.add('visible'), i * 40);
        });
        visibleCount = end;
        updateLoadMoreUI(photos);
    }

    function updateLoadMoreUI(photos) {
        const wrap = document.getElementById('loadMoreWrap');
        const countLabel = document.getElementById('loadMoreCount');
        if (visibleCount >= photos.length) {
            wrap.style.display = 'none';
        } else {
            wrap.style.display = 'flex';
            wrap.classList.add('visible');
            countLabel.textContent = visibleCount + ' / ' + photos.length + ' shown';
        }
    }

    document.getElementById('loadMoreBtn').addEventListener('click', () => {
        renderGallery(currentList, false);
    });

    function buildStrip(photos) {
        const track = document.getElementById('stripTrack');
        const stripSource = photos.length > 40 ? photos.slice(0, 40) : photos;
        const doubled = [...stripSource, ...stripSource];
        track.innerHTML = doubled.map(p =>
            `<div class="strip-item"><img src="${p.url}" alt="" loading="lazy" onerror="this.onerror=null;${isGoogleDriveUrl(p.rawUrl) ? '' : ''}"></div>`
        ).join('');
        // Attach fallback handlers for the strip images too.
        const stripImgs = track.querySelectorAll('img');
        doubled.forEach((p, i) => attachImgFallback(stripImgs[i], p));
        document.getElementById('stripSection').style.display = 'block';
    }

    // Recomputes currentList from allPhotos using both the active category
    // filter and the active search query, then re-renders the grid from
    // scratch. Called whenever either the filter buttons or the search box
    // change, so the two always combine rather than override each other.
    function applyFiltersAndSearch() {
        let list = activeFilter === 'all' ? allPhotos : allPhotos.filter(p => p.cat === activeFilter);
        if (searchQuery) {
            list = list.filter(p => p.searchIndex.indexOf(searchQuery) !== -1);
        }
        currentList = list;
        renderGallery(currentList, true);
        updateSearchStatus(list.length);
    }

    function updateSearchStatus(count) {
        const status = document.getElementById('searchStatus');
        if (!searchQuery) {
            status.textContent = '';
            status.classList.remove('active');
            return;
        }
        status.classList.add('active');
        status.textContent = count + (count === 1 ? ' result' : ' results') + ' for "' + searchQuery + '"';
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.filter;
            applyFiltersAndSearch();
        });
    });

    // ---- Typing search (debounced, instant filter) ----
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    let searchDebounce = null;

    searchInput.addEventListener('input', () => {
        searchClear.style.display = searchInput.value ? 'block' : 'none';
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
            searchQuery = searchInput.value.trim().toLowerCase();
            applyFiltersAndSearch();
        }, 150);
    });

    searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchClear.style.display = 'none';
        searchQuery = '';
        applyFiltersAndSearch();
        searchInput.focus();
    });

    // ---- Voice search (Web Speech API, English + Bengali) ----
    const micBtn = document.getElementById('micBtn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognizer = null;
    let isListening = false;

    // The Web Speech API only accepts one recognition language per session,
    // so true simultaneous bn+en listening isn't possible in one instance.
    // Instead: try Bengali first (since it's the less common of the two and
    // more likely to be misrecognized by an English-default engine), and if
    // nothing usable comes back, automatically retry the same recording
    // window in English. This covers a single voice search working for
    // either language without asking the user to pick one upfront.
    function runRecognition(lang, isRetry) {
        const rec = new SpeechRecognition();
        rec.lang = lang;
        rec.interimResults = false;
        rec.maxAlternatives = 1;
        let gotResult = false;
        let retried = false;

        function retryOrStop() {
            if (retried) return;
            retried = true;
            if (!isRetry && !gotResult) {
                runRecognition(lang === 'bn-BD' ? 'en-US' : 'bn-BD', true);
            } else {
                stopListening();
            }
        }

        rec.onresult = (e) => {
            const transcript = e.results[0][0].transcript.trim();
            if (!transcript) return;
            gotResult = true;
            searchInput.value = transcript;
            searchClear.style.display = 'block';
            searchQuery = transcript.toLowerCase();
            applyFiltersAndSearch();
        };

        rec.onerror = retryOrStop;
        rec.onend = retryOrStop;

        recognizer = rec;
        rec.start();
    }

    function startListening() {
        if (!SpeechRecognition) {
            document.getElementById('searchStatus').textContent =
                'Voice search isn\'t supported in this browser.';
            return;
        }
        isListening = true;
        micBtn.classList.add('listening');
        runRecognition('bn-BD', false);
    }

    function stopListening() {
        isListening = false;
        micBtn.classList.remove('listening');
        if (recognizer) {
            try { recognizer.onend = null; recognizer.onerror = null; recognizer.stop(); } catch (e) {}
            recognizer = null;
        }
    }

    micBtn.addEventListener('click', () => {
        if (isListening) {
            stopListening();
        } else {
            startListening();
        }
    });

    function openLightbox(idx) {
        const pos = currentList.findIndex(p => p.idx === idx);
        currentIdx = pos !== -1 ? pos : 0;
        updateLightbox();
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
    }
    function updateLightbox() {
        const p = currentList[currentIdx];
        document.getElementById('lbImg').src = p.url;
        document.getElementById('lbTitle').textContent = p.title;
        document.getElementById('lbCounter').textContent = (currentIdx + 1) + ' / ' + currentList.length;
        document.getElementById('lbDl').onclick = () => dlImg(p.downloadUrl, 'Tonir-' + (p.idx + 1) + '.jpg');
    }

    document.getElementById('lbClose').onclick = closeLightbox;
    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeLightbox();
    });

<script>
    let currentUrl = '';

    function openAlbum(url, title) {
        currentUrl = url;
        document.getElementById('albumTitle').textContent = title;
        document.getElementById('albumOpenBtn').href = url;
        document.getElementById('blockOpenBtn').href = url;

        // Reset states
        document.getElementById('albumLoading').style.display = 'flex';
        document.getElementById('blockNotice').style.display = 'none';
        document.getElementById('albumIframe').style.display = 'none';
        document.getElementById('albumIframe').src = '';

        document.getElementById('albumOverlay').classList.add('open');

        // Try loading iframe, detect block after timeout
        const iframe = document.getElementById('albumIframe');
        let loaded = false;

        iframe.onload = function() {
            loaded = true;
            document.getElementById('albumLoading').style.display = 'none';
            try {
                // If we can access contentDocument, it loaded fine
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                if (!doc || doc.title === '' || doc.body === null) {
                    showBlockNotice();
                } else {
                    iframe.style.display = 'block';
                }
            } catch(e) {
                // Cross-origin block — but page may have loaded fine
                iframe.style.display = 'block';
                document.getElementById('albumLoading').style.display = 'none';
            }
        };

        iframe.onerror = function() {
            showBlockNotice();
        };

        // Fallback: if 5s passes with no load, show block notice
        setTimeout(function() {
            if (!loaded) showBlockNotice();
        }, 5000);

        iframe.src = url;
    }

    function showBlockNotice() {
        document.getElementById('albumLoading').style.display = 'none';
        document.getElementById('albumIframe').style.display = 'none';
        document.getElementById('blockNotice').style.display = 'flex';
    }

    function closeAlbum() {
        document.getElementById('albumOverlay').classList.remove('open');
        document.getElementById('albumIframe').src = '';
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeAlbum();
    });
